<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>Prometheus — Phase 0</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #15171c;
        color: #e6e8ec;
        margin: 0;
        padding: 32px;
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .subtitle { margin: 0 0 24px; color: #8b909a; font-size: 13px; }
      button {
        background: #33ccff;
        color: #0a0c10;
        border: 0;
        border-radius: 6px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #5ad6ff; }
      #status { margin: 18px 0 8px; color: #b8bdc7; font-size: 13px; }
      pre {
        background: #0e1014;
        border: 1px solid #262a31;
        border-radius: 6px;
        padding: 14px;
        min-height: 96px;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>Prometheus</h1>
    <p class="subtitle">Phase 0 — Electron ↔ Python stdio JSON-RPC round-trip via probe()</p>
    <button id="pick">Pick clip &amp; probe</button>
    <p id="status">Idle.</p>
    <pre id="output"></pre>
    <script src="./renderer.js"></script>
  </body>
</html>
